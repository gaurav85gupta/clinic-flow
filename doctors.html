<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic — Doctors</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/doctors.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-container">
    <main class="main-content">

      <div class="page-header">
        <div class="page-header-left">
          <h1>Doctors</h1>
          <p id="doctorsHeaderSubtitle">Loading…</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-secondary"><span class="material-symbols-outlined">download</span> Export</button>
          <button class="btn btn-primary" onclick="openModal('addDoctorModal')"><span class="material-symbols-outlined">person_add</span> Add Doctor</button>
        </div>
      </div>

      <!-- Doctor Cards Grid -->
      <div class="doctor-cards-grid" id="doctorCards"></div>

      <!-- Doctor Performance Table -->
      <div class="card" style="margin-top:24px">
        <div class="card-padded" style="padding-bottom:8px">
          <div class="card-header">
            <div>
              <div class="card-title">Performance Overview</div>
              <div class="card-subtitle">Monthly statistics</div>
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Doctor</th>
                <th>Department</th>
                <th>Patients Seen</th>
                <th>Completion Rate</th>
                <th>Revenue</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="doctorTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Doctor Profile Modal -->
  <div class="modal-overlay" id="doctorModal">
    <div class="modal" style="max-width:660px">
      <div class="modal-header">
        <div class="modal-title">Doctor Profile</div>
        <button class="modal-close" onclick="closeModal('doctorModal')"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="modal-body" id="doctorModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('doctorModal')">Close</button>
        <span id="doctorModalFooterActions" style="display:contents"></span>
      </div>
    </div>
  </div>

  <!-- Add Doctor Modal -->
  <div class="modal-overlay" id="addDoctorModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add New Doctor</div>
        <button class="modal-close" onclick="closeModal('addDoctorModal')"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" placeholder="Dr. First Last" id="newDocFullName"></div>
          <div class="form-group"><label class="form-label">Department</label>
            <select class="form-select" id="newDocSpecialization">
              <option value="">Loading departments…</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Qualification</label><input class="form-input" placeholder="MBBS, MD..." id="newDocQualification"></div>
          <div class="form-group"><label class="form-label">Experience (years)</label><input class="form-input" type="number" placeholder="10" id="newDocExperience"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" placeholder="+91 98765 43210" id="newDocPhone"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="newDocEmail"></div>
        </div>
        <div class="form-group"><label class="form-label">Consultation Hours (Mon–Fri)</label>
          <div class="form-row">
            <input class="form-input" type="time" value="09:00" id="newDocHoursStart">
            <input class="form-input" type="time" value="17:00" id="newDocHoursEnd">
          </div>
        </div>
        <div id="newDocError" class="text-sm" style="color:var(--color-error);display:none;margin-top:4px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addDoctorModal')">Cancel</button>
        <button class="btn btn-primary" id="newDocSubmitBtn" onclick="submitNewDoctor()"><span class="material-symbols-outlined">check</span> Add Doctor</button>
      </div>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="js/api.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/export-helpers.js"></script>
  <script src="js/doctors.js"></script>
</body>
</html>
